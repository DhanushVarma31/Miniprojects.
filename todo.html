<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO List</title>
    <style>
        :root{
            --bg1: #0f172a;
            --bg2: #1e293b;
            --card: rgba(255,255,255,0.10);
            --card-border: rgba(255,255,255,0.16);
            --text: #e5e7eb;
            --muted: #94a3b8;
            --accent: #7c3aed;
            --danger: #ef4444;
            --shadow: 0 20px 60px rgba(0,0,0,0.35);
        }
        body{
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 18px;
            padding: 24px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top, rgba(124,58,237,0.35), transparent 32%),
                radial-gradient(circle at bottom right, rgba(34,197,94,0.20), transparent 28%),
                linear-gradient(145deg, var(--bg1), var(--bg2));
            min-height: 100vh;
            margin: 0;
            color: var(--text);
        }
        h1{
            color: var(--text);
            font-size: clamp(2rem, 4vw, 3rem);
            letter-spacing: 0.04em;
            margin: 0;
            text-align: center;
        }
        #taskInput{
            width: min(420px, 82vw);
            padding: 14px 16px;
            font-size: 1rem;
            border: 1px solid var(--card-border);
            border-radius: 14px;
            margin-bottom: 0;
            color: var(--text);
            background: rgba(15, 23, 42, 0.55);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        #taskInput:focus{
            outline: none;
            border-color: rgba(124,58,237,0.9);
            box-shadow: 0 0 0 4px rgba(124,58,237,0.22), var(--shadow);
            transform: translateY(-1px);
        }
        #taskInput::placeholder{
            color: var(--muted);
        }
        button{
            margin-left: 0;
            padding: 12px 20px;
            cursor: pointer;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), #2563eb);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.28);
        }
        button:hover{
            filter: brightness(1.05);
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(37, 99, 235, 0.34);
        }
        button:active{
            transform: translateY(0);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.24);
        }
        #taskList{
            list-style: none;
            padding: 0;
            margin: 6px 0 0 0;
            width: min(520px, 90vw);
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
            overflow: hidden;
        }
        #taskList li{
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            color: var(--text);
            transition: background-color 0.2s ease, transform 0.2s ease;
        }
        #taskList li:hover{
            background-color: rgba(255,255,255,0.06);
            transform: translateX(2px);
        }
        #taskList li:last-child{
            border-bottom: none;
        }
        #taskList li button{
            margin-left: auto;
            padding: 8px 12px;
            background: linear-gradient(135deg, var(--danger), #b91c1c);
            font-size: 0.9em;
            box-shadow: none;
        }
        #taskList li button:hover{
            filter: brightness(1.05);
        }
    </style>
</head>
<body>
    <h1>My TO-DO List</h1>
    <input type="text" id="taskInput" placeholder="Add a new task" style="margin-bottom:10px;">
    <button onclick="addTask()">Add Task</button>

    <ol id="taskList"></ol>
    <script>
        function addTask(){
            const taskInput = document.getElementById('taskInput');
            const taskList=document.getElementById('taskList')
            const task = taskInput.value.trim();
            if(!task) return;
            taskList.innerHTML += `<li>${task} <button onclick="this.parentElement.remove()">Delete</button></li>`;
            taskInput.value='';
        }
    </script>
</body>
</html>
